<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Redirecting to Tic Tac Toe...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Meta refresh fallback for non-JS environments -->
    <meta http-equiv="refresh" content="0; url=https://play.google.com/store/apps/details?id=com.farukg.tictactoe">
    
    <script>
      // Immediate redirect using JavaScript
      var isAndroid = /Android/i.test(navigator.userAgent);
      var playStoreUrl = "https://play.google.com/store/apps/details?id=com.farukg.tictactoe";
      
      // On Android, we can try to use the market:// intent which often opens the Play Store faster
      // and natively handles installed apps.
      if (isAndroid) {
        window.location.href = "market://details?id=com.farukg.tictactoe";
        // Fallback to https url if market:// fails (e.g. no play store)
        setTimeout(function() {
          window.location.replace(playStoreUrl);
        }, 500);
      } else {
        window.location.replace(playStoreUrl);
      }
    </script>
    <style>
      body {
        background: #050505;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .fallback {
        display: none;
        text-align: center;
      }
      p {
        color: #888; /* muted foreground */
        margin-bottom: 24px;
      }
      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 24px;
        background: #3b82f6;
        color: #fff;
        text-decoration: none;
        border-radius: 9999px;
        font-size: 14px;
        font-weight: 500;
        transition: opacity 0.2s;
      }
      a.button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="fallback" id="fallback">
      <p>If you are not redirected automatically...</p>
      <a href="https://play.google.com/store/apps/details?id=com.farukg.tictactoe" class="button">Open Google Play</a>
    </div>
    <script>
      // Show fallback UI if redirect doesn't happen quickly
      setTimeout(function() {
        document.getElementById('fallback').style.display = 'block';
      }, 1500);
    </script>
  </body>
</html>
